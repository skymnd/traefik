http:
  routers:
    truenas-router:
      rule: Host(`truenas.{{env "HOMELAB_DOMAIN"}}`)
      entryPoints:
        - websecure
      service: truenas
      tls:
        certResolver: le
    truenas-backup-router:
      rule: Host(`truenas-backup.{{env "HOMELAB_DOMAIN"}}`)
      entryPoints:
        - websecure
      service: truenas-backup
      tls:
        certResolver: le

  services:
    truenas:
      loadBalancer:
        servers:
          - url: http://{{env "TRUENAS_IP"}}
    truenas-backup:
      loadBalancer:
        servers:
          - url: http://{{env "TRUENAS_BACKUP_IP"}}
