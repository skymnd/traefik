http:
  routers:
    vaultwarden-router:
      rule: Host(`vaultwarden.{{env "HOMELAB_DOMAIN"}}`)
      entryPoints:
        - websecure
      service: vaultwarden
      tls:
        certResolver: le

  services:
    vaultwarden:
      loadBalancer:
        servers:
          - url: http://{{env "VAULTWARDEN_IP"}}:80
