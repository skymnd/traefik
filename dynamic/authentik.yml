http:
  routers:
    authentik-router:
      rule: Host(`authentik.{{env "HOMELAB_DOMAIN"}}`)
      entryPoints:
        - websecure
      service: authentik
      tls:
        certResolver: le

  services:
    authentik:
      loadBalancer:
        servers:
          - url: http://{{env "AUTHENTIK_IP"}}:9000

    authentik-default-outpost:
      loadBalancer:
        servers:
          - url: http://{{env "AUTHENTIK_IP"}}/outpost.goauthentik.io

  middlewares:
    authentik-middleware:
      forwardAuth:
        address: http://{{env "AUTHENTIK_IP"}}:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
